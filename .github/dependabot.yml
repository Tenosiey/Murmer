version: 2
updates:
  # Client frontend (Bun — managed under the npm ecosystem via bun.lock)
  - package-ecosystem: "npm"
    directory: "/murmer_client"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Client Tauri backend (Cargo)
  - package-ecosystem: "cargo"
    directory: "/murmer_client/src-tauri"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Server (Cargo)
  - package-ecosystem: "cargo"
    directory: "/murmer_server"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Server Docker base image
  - package-ecosystem: "docker"
    directory: "/murmer_server"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    groups:
      docker-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

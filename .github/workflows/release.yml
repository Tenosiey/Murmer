# Builds, signs and publishes a Windows release (NSIS installer + updater
# artifacts + latest.json) whenever a version tag like v2026.3.10-alpha.2 is
# pushed. The in-app updater reads latest.json from the latest GitHub release.
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: murmer_client/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: murmer_client/src-tauri

      - name: Install frontend dependencies
        working-directory: murmer_client
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: murmer_client
          tagName: ${{ github.ref_name }}
          releaseName: 'Murmer ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install this version.'
          # Must stay a normal release (not draft/prerelease): the updater
          # endpoint releases/latest/download/latest.json skips prereleases.
          releaseDraft: false
          prerelease: false
